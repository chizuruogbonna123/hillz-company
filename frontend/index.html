<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hillz industry — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f4f6fb;">
    <div class="login-box" style="max-width:420px;width:100%;padding:32px;background:#fff;border-radius:28px;box-shadow:0 24px 60px rgba(15,23,42,.12);">
      <div class="login-logo" style="margin-bottom:24px;text-align:center;">
        <div class="login-logo-name" style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;">hillz industry</div>
        <div class="login-logo-tag" style="font-size:13px;color:#6b7280;margin-top:8px;">Company Intelligence Suite</div>
      </div>
      <div class="auth-tabs" style="display:flex;gap:12px;margin-bottom:24px;">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')" style="flex:1;padding:12px 16px;border:none;border-radius:14px;background:#1d4ed8;color:#fff;cursor:pointer;">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')" style="flex:1;padding:12px 16px;border:none;border-radius:14px;background:#e5e7eb;color:#111;cursor:pointer;">Create Account</button>
      </div>
      <div id="form-login">
        <div class="login-err" id="login-err" style="display:block;color:#b91c1c;font-size:13px;margin-bottom:14px;min-height:18px;"></div>
        <div class="login-fg" style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:#374151;margin-bottom:6px;">Email</label>
          <input type="email" id="l-user" placeholder="Enter your email" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;outline:none;" />
        </div>
        <div class="login-fg pw-wrap" style="margin-bottom:24px;position:relative;">
          <label style="display:block;font-size:13px;color:#374151;margin-bottom:6px;">Password</label>
          <input type="password" id="l-pass" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;outline:none;" />
          <button class="pw-toggle" type="button" onclick="togglePw('l-pass', this)" style="position:absolute;right:14px;top:44px;border:none;background:none;cursor:pointer;font-size:18px;">👁</button>
        </div>
        <button type="button" class="login-btn" id="login-btn" onclick="doLogin()" style="width:100%;padding:14px 16px;border:none;border-radius:16px;background:#1d4ed8;color:#fff;font-weight:700;cursor:pointer;">Sign In →</button>
      </div>
      <div id="form-register" style="display:none;">
        <div class="login-err" id="reg-err" style="display:block;color:#b91c1c;font-size:13px;margin-bottom:14px;min-height:18px;"></div>
        <div class="login-ok" id="reg-ok" style="display:block;color:#166534;font-size:13px;margin-bottom:14px;min-height:18px;"></div>
        <div class="login-fg" style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:#374151;margin-bottom:6px;">Full Name</label>
          <input type="text" id="r-name" placeholder="Your full name" style="width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;outline:none;" />
        </div>
        <div class="login-fg" style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:#374151;margin-bottom:6px;">Email</label>
          <input type="email" id="r-user" placeholder="Enter your email" autocomplete="email" style="width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;outline:none;" />
        </div>
        <div class="login-fg pw-wrap" style="margin-bottom:16px;position:relative;">
          <label style="display:block;font-size:13px;color:#374151;margin-bottom:6px;">Password</label>
          <input type="password" id="r-pass" placeholder="Create a strong password" autocomplete="new-password" style="width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;outline:none;" />
          <button class="pw-toggle" type="button" onclick="togglePw('r-pass', this)" style="position:absolute;right:14px;top:44px;border:none;background:none;cursor:pointer;font-size:18px;">👁</button>
        </div>
        <div class="login-fg pw-wrap" style="margin-bottom:24px;position:relative;">
          <label style="display:block;font-size:13px;color:#374151;margin-bottom:6px;">Confirm Password</label>
          <input type="password" id="r-pass2" placeholder="Repeat your password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()" style="width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;outline:none;" />
          <button class="pw-toggle" type="button" onclick="togglePw('r-pass2', this)" style="position:absolute;right:14px;top:44px;border:none;background:none;cursor:pointer;font-size:18px;">👁</button>
        </div>
        <button type="button" class="login-btn" id="register-btn" onclick="doRegister()" style="width:100%;padding:14px 16px;border:none;border-radius:16px;background:#10b981;color:#fff;font-weight:700;cursor:pointer;">Create Account →</button>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
